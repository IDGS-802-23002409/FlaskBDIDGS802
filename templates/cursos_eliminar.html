{% extends "layout.html" %}
{% block container %}

<div class="max-w-md mx-auto mt-16 p-6 bg-white border border-gray-200 rounded-xl shadow-sm text-center">
    <svg class="mx-auto mb-4 text-red-400 w-12 h-12" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
    </svg>
    <h3 class="text-lg font-semibold text-gray-800 mb-2">¿Eliminar curso?</h3>
    <p class="text-gray-500 mb-1">Estás a punto de eliminar:</p>
    <p class="font-bold text-gray-800 mb-2">{{ curso.nombre }}</p>
    <p class="text-sm text-red-500 mb-6">Esta acción no se puede deshacer. Se perderán las inscripciones asociadas.</p>

    <form action="/cursos/eliminar?id={{ curso.id }}" method="POST" class="inline">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <button type="submit"
            class="px-5 py-2.5 text-sm font-semibold text-white bg-red-600 rounded-lg hover:bg-red-700 mr-2 transition-colors">
            Sí, Eliminar
        </button>
    </form>
    <a href="/cursos"
        class="px-5 py-2.5 text-sm font-semibold text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 transition-colors">
        Cancelar
    </a>
</div>

{% endblock %}
